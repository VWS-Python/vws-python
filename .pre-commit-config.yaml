---
fail_fast: true

# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

ci:
  # We use system Python, with required dependencies specified in pyproject.toml.
  # We therefore cannot use those dependencies in pre-commit CI.
  skip:
    - actionlint
    - check-manifest
    - deptry
    - doc8
    - docformatter
    - docs
    - interrogate
    - interrogate-docs
    - linkcheck
    - mypy
    - mypy-docs
    - pylint
    - pyproject-fmt-fix
    - pyright
    - pyright-docs
    - pyright-verifytypes
    - pyroma
    - ruff-check-fix
    - ruff-check-fix-docs
    - ruff-format-fix
    - ruff-format-fix-docs
    - shellcheck
    - shellcheck-docs
    - shfmt
    - shfmt-docs
    - spelling
    - vulture
    - vulture-docs

default_install_hook_types: [pre-commit, pre-push, commit-msg]
repos:
  - repo: meta
    hooks:
      - id: check-useless-excludes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-json
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-yaml
      - id: end-of-file-fixer
      - id: file-contents-sorter
        files: spelling_private_dict\.txt$
      - id: trailing-whitespace
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: rst-directive-colons
      - id: rst-inline-touching-normal
      - id: text-unicode-replacement-char
      - id: rst-backticks
  - repo: https://github.com/mrtazz/checkmake.git
    rev: 0.2.2
    hooks:
      - id: checkmake
        args: ["--config", ".checkmake-config.ini"]
  - repo: https://github.com/google/yamlfmt
    rev: v0.13.0
    hooks:
      - id: yamlfmt
  - repo: local
    hooks:
      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        pass_filenames: false
        types_or: [yaml]

      - id: docformatter
        name: docformatter
        entry: python -m docformatter --in-place
        language: system
        types_or: [python]

      - id: shellcheck
        name: shellcheck
        entry: shellcheck --shell=bash --exclude=SC1017
        language: system
        pass_filenames: false
        types_or: [shell]

      - id: shellcheck-docs
        name: shellcheck-docs
        entry: doccmd --language=shell --language=console --command="shellcheck --shell=bash --exclude=SC1017"
        language: system
        types_or: [markdown, rst]

      - id: shfmt
        name: shfmt
        entry: shfmt --write --space-redirects --indent=4
        language: system
        types_or: [shell]

      - id: shfmt-docs
        name: shfmt-docs
        entry: doccmd --language=shell --language=console --skip-marker=shfmt --no-pad-file --command="shfmt --write --space-redirects --indent=4"
        language: system
        types_or: [markdown, rst]

      - id: mypy
        name: mypy
        stages: [pre-push]
        entry: python -m mypy .
        language: system
        types_or: [python, toml]
        pass_filenames: false

      - id: mypy-docs
        name: mypy-docs
        stages: [pre-push]
        entry: doccmd --language=python --command="mypy"
        language: system
        types_or: [markdown, rst, python, toml]

      - id: check-manifest
        name: check-manifest
        stages: [pre-push]
        entry: python -m check_manifest .
        language: system
        pass_filenames: false

      - id: pyright
        name: pyright
        stages: [pre-push]
        entry: python -m pyright .
        language: system
        types_or: [python, toml]
        pass_filenames: false

      - id: pyright-docs
        name: pyright-docs
        stages: [pre-push]
        entry: doccmd --language=python --command="pyright"
        language: system
        types_or: [markdown, rst, python, toml]

      - id: vulture
        name: vulture
        entry: vulture .
        language: system
        types_or: [python]
        pass_filenames: false

      - id: vulture-docs
        name: vulture docs
        entry: doccmd --language=python --command="vulture"
        language: system
        types_or: [markdown, rst]

      - id: pyroma
        name: pyroma
        entry: python -m pyroma --min 10 .
        language: system
        pass_filenames: false
        types_or: [toml]

      - id: deptry
        name: deptry
        entry: python -m deptry src/
        language: system
        pass_filenames: false

      - id: pylint
        name: pylint
        entry: python -m pylint *.py src/ tests/ docs/
        language: system
        stages: [manual]
        pass_filenames: false

      - id: pylint-docs
        name: pylint-docs
        entry: doccmd --language=python --command="pylint"
        language: system
        stages: [manual]
        types_or: [markdown, rst, python, toml]

      - id: ruff-check-fix
        name: Ruff check fix
        entry: python -m ruff check --fix
        language: system
        types_or: [python]

      - id: ruff-check-fix-docs
        name: Ruff check fix docs
        entry: doccmd --language=python --command="ruff check --fix"
        language: system
        types_or: [markdown, rst]

      - id: ruff-format-fix
        name: Ruff format
        entry: python -m ruff format
        language: system
        types_or: [python]

      - id: ruff-format-fix-docs
        name: Ruff format docs
        entry: doccmd --language=python --no-pad-file --command="ruff format"
        language: system
        types_or: [markdown, rst]

      - id: doc8
        name: doc8
        entry: python -m doc8
        language: system
        types_or: [rst]

      - id: interrogate
        name: interrogate
        entry: python -m interrogate
        language: system
        types_or: [python]

      - id: interrogate-docs
        name: interrogate docs
        entry: doccmd --language=python --command="interrogate"
        language: system
        types_or: [markdown, rst]

      - id: pyproject-fmt-fix
        name: pyproject-fmt
        entry: pyproject-fmt
        language: system
        types_or: [toml]
        files: pyproject.toml

      - id: linkcheck
        name: linkcheck
        entry: make -C docs/ linkcheck SPHINXOPTS=-W
        language: system
        types_or: [rst]
        stages: [manual]
        pass_filenames: false

      - id: spelling
        name: spelling
        entry: make -C docs/ spelling SPHINXOPTS=-W
        language: system
        types_or: [rst]
        stages: [manual]
        pass_filenames: false

      - id: docs
        name: Build Documentation
        entry: make docs
        language: system
        stages: [manual]
        pass_filenames: false

      - id: pyright-verifytypes
        name: pyright-verifytypes
        stages: [pre-push]
        entry: python -m pyright --verifytypes vws
        language: system
        pass_filenames: false
        types_or: [python]
